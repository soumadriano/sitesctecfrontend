<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula JS Jogo da Velha - ver SCTEC</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
        }
        .celula {
            width: 100px;
            height: 100px;
            background-color: #e9dddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            cursor: pointer;
        }
        #botaoReiniciar {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div id="tabuleiro-jogo" class="tabuleiro">
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
    </div>
    <button id="botaoReiniciar" >Reiniciar o Jogo</button>
    <script src="script.js"></script>
</body>
</html>
