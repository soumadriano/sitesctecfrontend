 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Desconto</title>
</head>
<body>

    <h1>Calculadora de Desconto</h1>

    <p>Digite o preço do produto e a porcentagem de desconto para calcular o valor final.</p>

    <label for="preco">Preço original do produto (R$):</label><br>
    <input type="number" id="preco" placeholder="Ex: 100,00"><br><br>

    <label for="desconto">Porcentagem de desconto (%):</label><br>
    <input type="number" id="desconto" placeholder="Ex: 10"><br><br>

    <button onclick="calcularDesconto()">Calcular Desconto</button>

    <!-- Link para o arquivo JS externo -->
    <script src="script.js"></script>

</body>
</html>
